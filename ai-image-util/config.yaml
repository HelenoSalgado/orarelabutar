# Configuração do utilitário de IA
provider: ollama # Opções: cloudflare, ollama

providers:
  cloudflare:
    url: "https://ai.orarelabutar.com"
    # Adicione o token aqui se o seu worker exigir
    api_token: "" 
  ollama:
    url: "http://localhost:11434/api/generate"
    model: "gemma3:1b"

# Template do prompt de imagem
engraving_template: |
  Authentic 19th-century steel engraving technique, fine line art, deep black ink on aged parchment. 
  Minimalist {object}. Shadows created strictly through intricate cross-hatching and parallel lines, no soft shading, no pencil textures, no gradients. Sharp, clean, high-contrast ink strokes. 
  Historical woodcut or etching aesthetic. Isolated on cream paper background, no text, ultra-detailed line-work.
